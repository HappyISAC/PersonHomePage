name: Update Google Scholar Stats

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install scholarly requests

      - name: Show Files Before Run
        run: |
          pwd
          ls -la
          find . -maxdepth 3 -type f

      - name: Run Update Script
        run: python update_scholar.py

      - name: Show Generated Files
        run: |
          ls -la
          ls -la google-scholar-stats || true
          cat google-scholar-stats/gs_data_shieldsio.json || true

      - name: Commit and Push
        run: |
          git config --global user.name "Scholar Bot"
          git config --global user.email "bot@github.com"
          git add google-scholar-stats/*.json
          git commit -m "Auto-update Google Scholar stats" || echo "No changes to commit"
          git push
